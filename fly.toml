app = "gotham-fitness-agent"
primary_region = "ewr"

[build]

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "1024mb"
  cpu_kind = "shared"
  cpus     = 1

[[services.http_checks]]
  interval   = 30000
  timeout    = 5000
  path       = "/health"
  method     = "GET"
